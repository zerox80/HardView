name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Rust-Backend (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app/src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Rust-Toolchain + Komponenten
        run: rustup component add clippy rustfmt

      - name: Cargo-Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('app/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format pruefen
        run: cargo fmt --all -- --check

      - name: Clippy (Warnungen = Fehler)
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test --all

  frontend:
    name: Frontend-Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: JS-Syntax pruefen (node --check)
        run: |
          node --check app/src/app.js
          node --check app/src/mock.js
          node --check app/dev-server.js
